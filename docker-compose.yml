services:
  weibo-monitor:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-m.daocloud.io/docker.io/library/node:20-bookworm-slim}
    image: weibo-monitor:local
    container_name: weibo-monitor
    restart: unless-stopped
    depends_on:
      - weclaw
      - weclaw-2
    shm_size: "1gb"
    environment:
      WEIBO_MONITOR_CONFIG: /app/data/config.json
      WEIBO_MONITOR_CONFIG_TEMPLATE: /app/config.docker.example.json
      WEIBO_MONITOR_UI_HOST: 0.0.0.0
      WEIBO_MONITOR_UI_PORT: "18787"
      WEIBO_MONITOR_OPEN_BROWSER_ON_START: "0"
      WEIBO_MONITOR_CONTAINER: "1"
      WEIBO_MONITOR_BROWSER_HEADLESS: "1"
      WEIBO_MONITOR_NOVNC_PORT: "18790"
      WEIBO_MONITOR_WECLAW_LOG: /app/weclaw-logs/weclaw.log
      WEIBO_MONITOR_WECLAW_LOG_DIR: /app/weclaw-logs
      DISPLAY: ":99"
    volumes:
      - ./docker-data/weibo-monitor:/app/data
      - ./docker-data/weclaw-logs:/app/weclaw-logs:ro
    ports:
      - "127.0.0.1:18787:18787"
      - "127.0.0.1:18790:18790"

  weclaw:
    build:
      context: .
      dockerfile: docker/weclaw.Dockerfile
      args:
        ALPINE_IMAGE: ${ALPINE_IMAGE:-m.daocloud.io/docker.io/library/alpine:3.20}
    image: weclaw:local
    container_name: weclaw
    restart: unless-stopped
    command: ["start", "-f", "--api-addr", "0.0.0.0:18011"]
    environment:
      WECLAW_API_ADDR: 0.0.0.0:18011
      WECLAW_LOG_FILE: /var/log/weclaw/weclaw.log
    volumes:
      - ./docker-data/weclaw:/root/.weclaw
      - ./docker-data/weclaw-logs:/var/log/weclaw
    expose:
      - "18011"

  weclaw-2:
    build:
      context: .
      dockerfile: docker/weclaw.Dockerfile
      args:
        ALPINE_IMAGE: ${ALPINE_IMAGE:-m.daocloud.io/docker.io/library/alpine:3.20}
    image: weclaw:local
    container_name: weclaw-2
    restart: unless-stopped
    command: ["start", "-f", "--api-addr", "0.0.0.0:18011"]
    environment:
      WECLAW_API_ADDR: 0.0.0.0:18011
      WECLAW_LOG_FILE: /var/log/weclaw/weclaw-2.log
    volumes:
      - ./docker-data/weclaw-2:/root/.weclaw
      - ./docker-data/weclaw-logs:/var/log/weclaw
    expose:
      - "18011"
